<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Generator — AI Content Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <style>
    .module-page { max-width: 1200px; margin: 0 auto; padding: var(--space-xl); position: relative; z-index: 1; }
    .module-back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; margin-bottom: var(--space-lg); transition: color 150ms; text-decoration: none; }
    .module-back:hover { color: var(--accent); }
    .module-head { margin-bottom: var(--space-xl); }
    .module-head h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: var(--space-md); }
    .module-head h1 .icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; background: rgba(52,211,153,0.12); color: #34d399; }
    .module-head p { color: var(--text-secondary); margin-top: var(--space-sm); font-size: 15px; }
    .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xl); align-items: start; }
    @media (max-width: 900px) { .module-grid { grid-template-columns: 1fr; } }
    .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
    .panel-body { padding: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-lg); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--border); background: var(--bg-subtle); }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .preview-content { padding: var(--space-xl); font-size: 15px; line-height: 1.8; min-height: 400px; max-height: 700px; overflow-y: auto; }
    .preview-content h1 { font-size: 24px; font-weight: 800; margin: 0 0 12px; }
    .preview-content h2 { font-size: 20px; font-weight: 700; margin: 24px 0 8px; color: var(--accent); }
    .preview-content p { margin-bottom: 12px; color: var(--text-secondary); }
    .preview-content ul { padding-left: 24px; margin-bottom: 12px; }
    .preview-content li { margin-bottom: 4px; color: var(--text-secondary); }
    .preview-content strong { color: var(--text); }
    .preview-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px; color: var(--text-muted); text-align: center; }
    .preview-placeholder h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .preview-placeholder p { font-size: 13px; }
    .platform-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-sm); }
    .platform-card { padding: 14px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); text-align: center; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600; transition: all 150ms; }
    .platform-card:hover { border-color: var(--accent); color: var(--accent); }
    .platform-card.active { background: var(--accent); border-color: var(--accent); color: white; }
    .platform-card .platform-icon { font-size: 20px; margin-bottom: 4px; }
    .shimmer-line { height: 16px; border-radius: 8px; background: linear-gradient(90deg, var(--bg-input) 0%, var(--bg-elevated) 50%, var(--bg-input) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 12px; }
    .shimmer-line:nth-child(2) { width: 85%; } .shimmer-line:nth-child(3) { width: 70%; } .shimmer-line:nth-child(5) { width: 90%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div id="toast-container"></div>
  <canvas id="confetti-canvas"></canvas>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <span class="brand-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span>
        <span class="brand-text">ContentGen<span class="brand-ai">AI</span></span>
      </a>
      <div class="nav-actions">
        <button class="nav-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="module-page">
    <a href="index.html" class="module-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Dashboard
    </a>

    <div class="module-head">
      <h1>
        <span class="icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l11.733 16h4.267l-11.733-16z"/><path d="M4 20l6.768-6.768M15.232 11.232L20 4"/></svg>
        </span>
        Social Media Generator
      </h1>
      <p>Create engaging threads and posts optimized for each platform.</p>
    </div>

    <div class="module-grid">
      <div class="panel">
        <div class="panel-body">
          <div>
            <label class="select-label">Platform</label>
            <div class="platform-cards" id="platform-cards">
              <button class="platform-card active" data-platform="twitter">
                <div class="platform-icon">𝕏</div>
                Twitter / X
              </button>
              <button class="platform-card" data-platform="linkedin">
                <div class="platform-icon">in</div>
                LinkedIn
              </button>
              <button class="platform-card" data-platform="mastodon">
                <div class="platform-icon">🐘</div>
                Mastodon
              </button>
            </div>
          </div>

          <div class="input-group">
            <input type="text" id="topic" class="float-input" placeholder=" " required>
            <label for="topic" class="float-label">Topic or theme</label>
            <div class="input-hint">What should this thread be about?</div>
          </div>

          <div>
            <label class="select-label">Tone</label>
            <div class="tone-chips">
              <button type="button" class="chip active" data-tone="professional">Professional</button>
              <button type="button" class="chip" data-tone="casual">Casual</button>
              <button type="button" class="chip" data-tone="enthusiastic">Enthusiastic</button>
              <button type="button" class="chip" data-tone="witty">Witty</button>
            </div>
          </div>

          <div class="input-group">
            <input type="text" id="hashtags" class="float-input" placeholder=" ">
            <label for="hashtags" class="float-label">Hashtags (optional)</label>
          </div>

          <div>
            <label class="select-label">Export format</label>
            <div class="format-toggles">
              <button type="button" class="format-btn active" data-format="markdown">Markdown</button>
              <button type="button" class="format-btn" data-format="text">Plain Text</button>
            </div>
          </div>

          <button class="generate-btn" id="generate-btn" onclick="generateSocial()">
            <span class="btn-content">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Generate Thread
            </span>
            <span class="btn-loading"><span class="spinner"></span> Crafting thread...</span>
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Preview</span>
          <div style="display: flex; gap: 4px;">
            <button class="action-btn" onclick="copyText(Generator.getLastContent())" title="Copy"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy</span></button>
            <button class="action-btn" onclick="downloadFile(Generator.getLastContent(), 'social-thread.md')" title="Download"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>Download</span></button>
          </div>
        </div>
        <div class="preview-content" id="preview-body">
          <div class="preview-placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.3"><path d="M4 4l11.733 16h4.267l-11.733-16z"/><path d="M4 20l6.768-6.768M15.232 11.232L20 4"/></svg>
            <h3>Your social thread will appear here</h3>
            <p>Select a platform and generate</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="footer-inner"><div class="footer-brand"><span class="brand-text">ContentGen<span class="brand-ai">AI</span></span><span class="footer-copy">Built by Little Boots</span></div><div class="footer-links"><a href="index.html">Dashboard</a><a href="../stripe/checkout.html">Pricing</a></div></div></footer>

  <script src="app.js"></script>
  <script>
    // Platform card selection
    document.querySelectorAll('.platform-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.platform-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
    });

    async function generateSocial() {
      const topic = document.getElementById('topic').value;
      const platform = document.querySelector('.platform-card.active')?.dataset.platform || 'twitter';
      const preview = document.getElementById('preview-body');
      await Generator.runModule('social', { topic, platform }, preview);
    }
  </script>
</body>
</html>
