# =============================================================================
# Twine Configuration for ai-contentgen
# =============================================================================
# This file configures twine for automated and manual publishing.
#
# Usage with twine:
#   twine upload --config-file pypi/twine.ini dist/*
#   twine upload --config-file pypi/twine.ini -r testpypi dist/*
#
# Environment variable authentication (preferred for CI):
#   TWINE_USERNAME=__token__
#   TWINE_PASSWORD=pypi-<your-token>
#
# Or use ~/.pypirc for local development (see .pypirc.template).
# =============================================================================

[pypi]
repository = https://upload.pypi.org/legacy/
# username and password should come from ~/.pypirc, environment variables,
# or CI secrets — never hardcode them here.

[testpypi]
repository = https://test.pypi.org/legacy/

# ---------------------------------------------------------------------------
# Twine upload defaults
# ---------------------------------------------------------------------------
# These settings apply to all uploads unless overridden on the command line.
#
# Sign uploads with GPG (optional — uncomment if you have a signing key):
# sign = true
# identity = your-gpg-key-id@example.com
#
# Skip existing versions instead of failing:
# skip-existing = true
#
# Verbose output for debugging:
# verbose = true
